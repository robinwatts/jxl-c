on:
  push:
    branches:
      - main
      - v*.x
      - c-port
    paths:
      - '**'
      - '.github/workflows/sanitizers.yml'
  pull_request:
    paths:
      - '**'
      - '.github/workflows/sanitizers.yml'
  workflow_dispatch: {}

name: Sanitizers

jobs:
  asan-ubsan:
    name: ASan+UBSan (ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure
        run: >
          cmake -S . -B build-san
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DJXL_OXIDE_C_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-san --config RelWithDebInfo -j2
      - name: Prefetch conformance references
        run: python3 tests/conformance/gen_conformance_cases.py
      - name: Test
        run: >
          ctest --test-dir build-san -C RelWithDebInfo
          --output-on-failure
          -E 'c_unit_crop_conformance'
      - name: Smoke fuzz decode helper
        run: |
          sudo apt-get update && sudo apt-get install -y g++ libstdc++-14-dev
          cmake -S . -B build-fuzz \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DJXL_OXIDE_C_BUILD_FUZZ=ON \
            -DJXL_OXIDE_C_BUILD_TESTS=OFF
          cmake --build build-fuzz --target decode_fuzzer -j2
          mkdir -p /tmp/jxl-corpus
          curl -sSfL 'https://jxl-oxide-fixtures.tirr.dev/fuzz-corpus.tar.zst' | zstd -d | tar -xC /tmp/jxl-corpus
          /usr/bin/find /tmp/jxl-corpus -type f | head -5 | while read -r f; do
            LLVM_PROFILE_FILE= build-fuzz/decode_fuzzer "$f" -runs=1
          done
